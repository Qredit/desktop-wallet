<md-container id="home-box-network" style="color:#fff;" md-whiteframe="3">
  <md-list flex style="border:1px solid white; border-radius:25px;">
    <md-list-item>
      <md-tooltip>
        <translate>Switch Network</translate>
      </md-tooltip>
      <b translate>Network</b>
      <md-button class="md-secondary" aria-label="Switch Network" md-prevent-menu-close
        ng-click="$ctrl.ul.switchNetwork()">{{$ctrl.ul.connectedPeer.network}}/{{$ctrl.ul.connectedPeer.height}}
      </md-button>
    </md-list-item>
    <md-list-item>
      <md-tooltip>
        <translate>Pick Random Peer</translate>
      </md-tooltip>
      <b translate>Peer</b>
      <md-button class="md-secondary" aria-label="Pick Random Peer" md-prevent-menu-close
        ng-click="$ctrl.ul.pickRandomPeer()">{{$ctrl.ul.connectedPeer.ip}}</md-button>
    </md-list-item>
    <md-list-item>
      <b translate>Last checked</b> <span class="md-secondary">{{$ctrl.ul.connectedPeer.lastConnection |
        date:'shortTime'}}</span>
    </md-list-item>
  </md-list>
</md-container>
